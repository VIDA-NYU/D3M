<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8"/>
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- RSS feed -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }}"
  href="{{ site.url }}/feed.xml">

  <!-- Customized Bootstrap + Font Awesome + Solarized -->
  <link href="/css/style.css" rel="stylesheet" media="screen">

  <!-- Favicon -->
  <link rel="icon" href="/favicons/favicon.png">
  <link rel="mask-icon" href="/favicons/safari-pinned-tab.svg" color="#5bbad5">
  <link rel="shortcut icon" href="/favicons/favicon.ico">
  <meta name="msapplication-config" content="/favicons/browserconfig.xml">
  <meta name="theme-color" content="#ffffff">

  <!-- Google Analytics -->
  <script type="text/javascript">

    var _gaq = _gaq || [];
    _gaq.push(['_setAccount', 'UA-26220778-1']);
    _gaq.push(['_trackPageview']);

    (function() {
      var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
      ga.src = ('https:' == document.location.protocol ? 'https://ssl' : 'http://www') + '.google-analytics.com/ga.js';
      var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(ga, s);
    })();

  </script>
  <!-- END Google Analytics -->

  <script type="text/javascript"
    src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-MML-AM_CHTML"">
  </script>

  <!-- jQuery -->
  <script src="/js/jquery.min.js"></script>

  <!-- Bootstrap -->
  <script src="/js/transition.js"></script>
  <script src="/js/collapse.js"></script>

  <!-- Custom script to put footer at bottom even if post is short -->
  <!-- also controls color of footer logo on mouseover -->
  <script src="/js/footer.js"></script>

</head>

<body>

  <div id="header">
    <nav class="navbar navbar-default" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar-collapse-element" aria-expanded="false">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="/">D3M Project</a>
        </div>
        <div class="collapse navbar-collapse" id="navbar-collapse-element">
          <ul class="nav navbar-nav navbar-right">
            {% if page.categories.first == 'research' %}
            <li class="active">
            {% else %}
            <li>
            {% endif %}
              <a href="/research/">Research</a>
            </li>
            {% if page.categories.first == 'publications' %}
            <li class="active">
            {% else %}
            <li>
            {% endif %}
              <a href="/publications/">Publications</a>
            </li>
            {% if page.categories.first == 'members' %}
            <li class="active">
            {% else %}
            <li>
            {% endif %}
              <a href="/members/">Team</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </div>

  <div id="content-wrapper">
    <div class="container">
      {{ content }}
    </div>
  </div>

  <div class="logo-container" style="display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 2em;">
        <div class="logo">
          <img src="/images/nyu_vida.png" alt="NYU VIDA" style="width: 150px; height: 50px;">
        </div>
        <div class="logo">
          <img src="/images/darpa.png" alt="DARPA" style="width: 150px; height: 50px;">
        </div>
  </div>
  <br>

  <div id="footer">
    <nav class="navbar navbar-inverse text-center" role="navigation">
      <div id="footer-logo-box" class="container">
        <ul class="nav navbar-nav footernav">
          <li>
            
          </li>
        </ul>
      </div>
      <div class="spacer"></div>
    </nav>
  </div>

</body>
</html>
